name: Deploy

on:
  push:
    branches:
      - master
    paths:
      - "themes/**/*"
      - "plugins/**/*"
      - ".github/workflows/*.yml"
  workflow_dispatch:
  workflow_call:
    secrets:
      ACCESS_TOKEN:
        required: true

concurrency:
  group: deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions: read-all
    timeout-minutes: 120
    env:
      NODE_OPTIONS: "--max_old_space_size=8192"
      YARN_ENABLE_IMMUTABLE_INSTALLS: false
      ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN || secrets.GITHUB_TOKEN }}
      YARN_CHECKSUM_BEHAVIOR: update
      TERM: xterm

    steps:
      - name: Checkout main repository
        uses: actions/checkout@v3
        with:
          ref: master
          repository: dimaslanjaka/hexo-themes
          token: "${{ secrets.ACCESS_TOKEN || secrets.GITHUB_TOKEN }}"
          lfs: ""

      - name: Checkout deployment repository
        uses: actions/checkout@v3
        with:
          repository: dimaslanjaka/hexo-themes
          path: .deploy_git
          ref: gh-pages
          lfs: ""

      # ✅ Install Node manually (REPLACES setup-node)
      - name: Install Node.js (manual)
        run: |
          NODE_VERSION=20.11.1
          curl -fsSL https://nodejs.org/dist/v$NODE_VERSION/node-v$NODE_VERSION-linux-x64.tar.xz -o node.tar.xz
          mkdir -p $HOME/node
          tar -xJf node.tar.xz -C $HOME/node --strip-components=1
          echo "$HOME/node/bin" >> $GITHUB_PATH

      - name: Verify Node
        run: |
          node -v
          npm -v

      # ✅ Enable Yarn Berry via Corepack
      - name: Setup Yarn 4.14.1
        run: |
          corepack enable
          corepack prepare yarn@4.14.1 --activate
          yarn -v

      - name: update submodules
        run: |
          echo "init submodules"
          git submodule init
          git submodule foreach "git submodule init"
          echo "sync submodules"
          git submodule sync
          git submodule foreach "git submodule sync"
          echo "update submodules"
          yarn dlx rimraf .git/modules
          yarn dlx binary-collections@https://raw.githubusercontent.com/dimaslanjaka/bin/master/releases/bin.tgz submodule-install

      - name: Initialize cache
        uses: actions/cache@v3
        id: cache
        with:
          path: |
            **/node_modules
            ~/.cache/yarn
            ./.yarn/cache*
            ./.yarn/*.gz
            **/dist
            **/.yarn/cache*
            **/node_modules
            **/tmp
            **/*.lock
            db.json
          key: ${{ runner.os }}-${{ hashFiles('**/package.json', '**/themes/**/*.cjs', '**/themes/**/*.js', '**/themes/**/*.ts', '**/themes/**/*.scss', '**/themes/**/*.njk', '**/themes/**/*.pug', '**/themes/**/*.styl') }}
          restore-keys: |
            ${{ runner.os }}-

      - name: Install dependencies
        run: |
          yarn install

      - name: Build packages
        run: npm run build

      - name: Switch hexo-theme-flowbite
        run: node bin/switch-theme flowbite

      - name: Build site
        run: npm run site:build

      - name: Deploy github pages
        run: node bin/deploy
        shell: bash
